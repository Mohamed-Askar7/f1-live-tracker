databases:
  - name: f1-live-tracker-db
    databaseName: f1_live_tracker
    user: f1_live_tracker

services:
  # Backend
  - type: web
    name: f1-live-tracker-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://example.com
      - key: POLL_INTERVAL
        value: "5000"
      - key: OPENF1_BASE_URL
        value: https://api.openf1.org/v1
      - key: DATABASE_URL
        fromDatabase:
          name: f1-live-tracker-db
          property: connectionString

  # Frontend (Vite build served as static)
  - type: web
    name: f1-live-tracker-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_BASE
        value: https://example.com/api